<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whisper Pro v7 - Undo & History</title>
    <style>
        :root { 
            --accent: #00ff9d; 
            --bg: #0d0d12; 
            --panel: #16161e; 
            --border: #444; 
            --error: #ff4757; 
            --text-main: #ffffff; 
            --text-dim: #bbbbbb; 
        }
        body { 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            background: var(--bg); 
            color: var(--text-main); 
            padding: 20px; 
            text-align: center; 
            font-size: 18px; 
        }
        .container { 
            max-width: 850px; 
            margin: 0 auto; 
            background: var(--panel); 
            padding: 30px; 
            border-radius: 16px; 
            border: 1px solid var(--border); 
            box-shadow: 0 0 50px rgba(0,0,0,0.7); 
        }
        h1 { color: var(--accent); font-size: 2.2rem; margin-bottom: 25px; }
        .status { 
            color: var(--accent); 
            font-weight: 800; 
            margin: 20px; 
            font-size: 1.5rem; 
            min-height: 1.6em; 
            text-transform: uppercase; 
        }
        .active-mic { color: var(--error); text-shadow: 0 0 20px var(--error); }
        .controls { 
            margin-bottom: 25px; 
            background: #252533; 
            padding: 18px; 
            border-radius: 10px; 
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 20px;
            border: 1px solid #444;
        }
        .control-group { display: flex; align-items: center; gap: 10px; }
        select { 
            background: #3d3d4d; 
            color: white; 
            border: 1px solid #666; 
            padding: 10px 15px; 
            border-radius: 6px; 
            font-size: 1.1rem;
        }
        .vib-toggle { cursor: pointer; display: flex; align-items: center; gap: 8px; font-weight: bold; }
        input[type="checkbox"] { width: 20px; height: 20px; cursor: pointer; }
        textarea { 
            width: 100%; 
            height: 220px; 
            background: #050508; 
            border: 1px solid #4d4d61; 
            color: #ffffff; 
            border-radius: 10px; 
            padding: 20px; 
            font-size: 1.2rem; 
            margin-bottom: 15px; 
            resize: vertical;
            box-sizing: border-box;
            line-height: 1.5;
        }
        #result-display { 
            background: #1c1c26; 
            border: 1px solid #444; 
            padding: 18px; 
            border-radius: 10px; 
            text-align: left; 
            color: var(--accent); 
            font-size: 0.9rem;
        }
        .info-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 15px; 
            text-align: left; 
            margin-top: 30px; 
            color: var(--text-dim); 
            font-size: 1.05rem; 
            border-top: 1px solid #444; 
            padding-top: 25px; 
        }
        .info-grid b { color: var(--accent); margin-right: 8px; }
    </style>
</head>
<body>

<div class="container">
    <h1>WHISPER PRO v7</h1>

    <div class="controls">
        <div class="control-group">
            <label>NYELV:</label>
            <select id="langSelect">
                <option value="hu">Magyar (HU)</option>
                <option value="en">Angol (EN)</option>
                <option value="auto">Auto-Detect</option>
            </select>
        </div>
        <div class="control-group">
            <label class="vib-toggle"><input type="checkbox" id="vibToggle"> REZGÉS</label>
        </div>
    </div>

    <div id="st-text" class="status">READY</div>
    
    <textarea id="kerdes" placeholder="Bármilyen gombnyomás leállítja a felolvasást..."></textarea>
    
    <div id="result-display">Rendszer: 1 duplán = UNDO (max. 15 lépés)</div>

    <div class="info-grid">
        <div><b>1 duplán:</b> Visszavonás (Undo)</div>
        <div><b>7:</b> PTT rögzítés</div>
        <div><b>3:</b> Okos törlés</div>
        <div><b>8:</b> Start/Stop</div>
        <div><b>1:</b> Olvasás</div>
        <div><b>4:</b> Ismétlés</div>
        <div><b>SHIFT:</b> TTS Stop</div>
    </div>
</div>

<script>
    /* ---------- ÁLLANDÓ KONSTANTÁK ---------- */
    const GROQ_KEY = "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";
    const MAX_HISTORY = 15;
    const DOUBLE_TAP_MS = 350;

    /* ---------- ÁLLAPOTVÁLTOZÓK ---------- */
    let historyStack = [];
    let currentContent = "";
    let mediaRecorder;
    let audioChunks = [];
    let isRecording = false;
    let lastAiResponse = "";
    let synth = window.speechSynthesis;
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    const stText = document.getElementById('st-text');
    const inputField = document.getElementById('kerdes');
    const langSelect = document.getElementById('langSelect');
    const vibToggle = document.getElementById('vibToggle');
    const resDisplay = document.getElementById('result-display');

    let keysPressed = {};
    let last1Press = 0;

    /* ---------- INICIALIZÁLÁS ---------- */
    window.onload = () => {
        langSelect.value = localStorage.getItem('w7_lang') || 'hu';
        vibToggle.checked = localStorage.getItem('w7_vib') === 'true';
        currentContent = localStorage.getItem('w7_saved_text') || "";
        inputField.value = currentContent;
    };

    /* ---------- HISTORY KEZELÉSE ---------- */
    function saveToHistory() {
        historyStack.push(inputField.value);
        if (historyStack.length > MAX_HISTORY) historyStack.shift();
    }

    function undo() {
        if (historyStack.length > 0) {
            inputField.value = historyStack.pop();
            syncAll(true);
            beep(900, 0.1);
            resDisplay.innerText = "Visszavonva! Lépések hátra: " + historyStack.length;
        } else {
            resDisplay.innerText = "Nincs több visszavonható lépés.";
        }
    }

    /* ---------- SZINKRONIZÁLÁS ---------- */
    async function syncAll(isUndo = false) {
        if (!isUndo) saveToHistory();
        currentContent = inputField.value;
        localStorage.setItem('w7_saved_text', currentContent);
        try {
            await navigator.clipboard.writeText(currentContent);
            resDisplay.innerText = isUndo ? "UNDO VÉGREHAJTVA" : "SZINKRONIZÁLVA ✅";
        } catch (e) {
            resDisplay.innerText = "Vágólap hiba.";
        }
    }

    /* ---------- SEGÉDFÜGGVÉNYEK ---------- */
    function stopTTS() { synth.cancel(); }

    function vibrate(pattern) {
        if (vibToggle.checked && "vibrate" in navigator) {
            navigator.vibrate(pattern);
        }
    }

    function beep(freq = 550, duration = 0.15) {
        try {
            const o = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            o.connect(g);
            g.connect(audioCtx.destination);
            o.frequency.value = freq;
            g.gain.setValueAtTime(0.05, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
            o.start();
            o.stop(audioCtx.currentTime + duration);
        } catch (e) {}
    }

    /* ---------- OKOS TÖRLÉS ---------- */
    function smartDelete() {
        saveToHistory();
        const text = inputField.value;
        if (!text) return;
        let lines = text.split('\n');
        let lastLine = lines[lines.length - 1];
        const sentences = lastLine.match(/[^.!?]+[.!?]+/g) || [lastLine];
        if (sentences.length >= 3) {
            sentences.pop();
            lines[lines.length - 1] = sentences.join('').trimEnd();
        } else {
            lines.pop();
        }
        inputField.value = lines.join('\n');
        beep(400, 0.1);
        syncAll(true);
    }

    /* ---------- BILLENTŰ KEZELÉS ---------- */
    window.addEventListener('keydown', (e) => {
        stopTTS();
        keysPressed[e.key] = true;
        if (e.repeat) return;

        if (e.key === '1') {
            e.preventDefault();
            const now = Date.now();
            if (now - last1Press < DOUBLE_TAP_MS) {
                undo();
                last1Press = 0;
            } else {
                last1Press = now;
                speak(inputField.value || "Üres.");
            }
        }

        if (e.key === '3') { e.preventDefault(); smartDelete(); }
        if (e.key === '4') { e.preventDefault(); speak(lastAiResponse || "Nincs."); }

        if (e.key === '7' && !isRecording) startRecording("● RÖGZÍTÉS...");
        if (e.key === '8') {
            if (!isRecording) startRecording("● FOLYAMATOS");
            else stopRecording();
        }
    });

    window.addEventListener('keyup', (e) => {
        delete keysPressed[e.key];
        if (e.key === '7' && isRecording) stopRecording();
    });

    /* ---------- RÖGZÍTÉS ---------- */
    async function startRecording(msg) {
        stopTTS();
        isRecording = true;
        audioChunks = [];
        stText.textContent = msg;
        stText.classList.add('active-mic');
        beep(600, 0.1);
        vibrate(60);
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            mediaRecorder.ondataavailable = (e) => audioChunks.push(e.data);
            mediaRecorder.onstop = sendToWhisper;
            mediaRecorder.start();
        } catch (err) {
            stText.textContent = "MIKROFON HIBA!";
            isRecording = false;
        }
    }

    function stopRecording() {
        if (!isRecording) return;
        isRecording = false;
        stText.textContent = "FELDOLGOZÁS...";
        stText.classList.remove('active-mic');
        beep(300, 0.1);
        vibrate([40, 40, 40]);
        if (mediaRecorder) mediaRecorder.stop();
    }

    async function sendToWhisper() {
        const audioBlob = new Blob(audioChunks, { type: 'audio/mpeg' });
        const formData = new FormData();
        formData.append("file", audioBlob, "speech.m4a");
        formData.append("model", "whisper-large-v3-turbo");
        if (langSelect.value !== "auto") formData.append("language", langSelect.value);

        try {
            const response = await fetch("https://api.groq.com/openai/v1/audio/transcriptions", {
                method: "POST",
                headers: { "Authorization": `Bearer ${GROQ_KEY}` },
                body: formData
            });
            const data = await response.json();
            const text = data.text || "";
            if (text) {
                saveToHistory();
                inputField.value += (inputField.value ? '\n' : '') + text;
                lastAiResponse = text;
                await syncAll(true);
                speak(text);
                stText.textContent = "READY";
            } else {
                stText.textContent = "API HIBA";
            }
        } catch (err) {
            stText.textContent = "API HIBA";
        }
    }

    /* ---------- TTS ---------- */
    function speak(text) {
        if (!text) return;
        stopTTS();
        const utter = new SpeechSynthesisUtterance(text);
        utter.lang = (langSelect.value === 'en') ? 'en-US' : 'hu-HU';
        synth.speak(utter);
    }
</script>
</body>
</html>
