
<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover">
    <title>Kimi-chat Interface v2.16</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root { 
            --accent: #76b900; /* Kimi Green */
            --bg: #050505; 
            --panel: #111; 
            --border: #333; 
            --user-bubble: #0056b3;
            --ai-bubble: #1a1a1a;
            --text-main: #eee; 
            --text-dim: #888; 
        }
        * { box-sizing: border-box; }
        
        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background: var(--bg); 
            color: var(--text-main); 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            height: 100dvh; 
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* --- KIMI HEADER --- */
        header { 
            padding: 15px; 
            border-bottom: 2px solid var(--accent); 
            background: #000; 
            font-weight: bold; 
            color: var(--accent); 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            flex-shrink: 0;
            z-index: 10;
        }

        .header-controls { display: flex; gap: 10px; align-items: center; font-size: 0.8rem; }
        
        /* --- MAIN SCROLLABLE AREA --- */
        #main-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            scroll-behavior: smooth;
            min-height: 0; 
        }

        /* --- CHAT BUBBLES (Kimi Style) --- */
        .msg { 
            max-width: 90%; 
            padding: 15px; 
            border-radius: 12px; 
            line-height: 1.5;
            position: relative;
            word-wrap: break-word;
            transition: background-color 0.2s;
        }
        .u { 
            align-self: flex-end; 
            background: var(--user-bubble); 
            color: white;
            border-bottom-right-radius: 2px;
            margin-left: auto;
        }
        .k { 
            align-self: flex-start; 
            background: var(--ai-bubble); 
            border: 1px solid var(--border); 
            color: #ddd;
            border-bottom-left-radius: 2px;
            width: 100%;
        }

        /* --- BOTTOM CONTROLS (Fixed & Animated) --- */
        .bottom-panel {
            background: #111;
            border-top: 1px solid #333;
            padding: 10px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 50vh; 
            overflow-y: auto;
            /* --- Animáció az Auto-Hidehoz --- */
            transition: max-height 0.4s ease-in-out, opacity 0.4s ease-in-out, padding 0.4s ease-in-out, transform 0.4s ease-in-out;
            transform-origin: bottom;
        }

        /* --- Rejtett állapot --- */
        .panel-hidden {
            max-height: 0;
            opacity: 0;
            padding: 0;
            transform: translateY(20px);
            overflow: hidden;
        }

        /* --- INPUT AREA --- */
        .input-box {
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }

        textarea#kerdes {
            flex: 1;
            background: #222;
            border: 1px solid #444;
            color: #fff;
            padding: 12px;
            border-radius: 8px;
            font-family: inherit;
            resize: none;
            height: 60px;
            min-height: 60px;
            -webkit-overflow-scrolling: touch;
        }
        textarea#kerdes:focus { outline: none; border-color: var(--accent); }

        /* --- BUTTONS (Refactored) --- */
        .btn-base { 
            background: #222; 
            border: 1px solid #444; 
            color: var(--accent); 
            border-radius: 6px; 
            font-weight: bold; 
            cursor: pointer; 
            transition: 0.2s; 
            text-transform: uppercase;
            font-size: 0.8rem;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn-base:hover { background: #333; border-color: var(--accent); }
        
        .btn-main { background: var(--accent); color: #000; border: none; height: 60px; font-size: 1rem; }
        .btn-main:hover { background: #5ea300; }
        
        .btn-icon { padding: 0 10px; font-size: 1.2rem; height: 60px; }

        /* --- PTT BUTTON --- */
        .ptt-btn {
            background: #222;
            border: 2px solid var(--accent);
            color: var(--accent);
            width: 60px; height: 60px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.5rem;
            cursor: pointer;
            flex-shrink: 0;
            user-select: none;
        }
        .ptt-btn:active, .ptt-btn.active { background: var(--accent); color: #000; box-shadow: 0 0 15px var(--accent); }

        /* --- STATUS BAR & EXTRA CONTROLS --- */
        .status-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #666;
            font-size: 0.75rem;
            padding: 0 5px;
        }
        
        .extra-tools {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 5px;
        }
        
        select { 
            background: #000; color: #fff; border: 1px solid #444; 
            padding: 5px; border-radius: 4px; font-size: 0.8rem; 
        }

        /* --- COUNTERS --- */
        .counter-badge {
            background: #222; border: 1px solid #333;
            padding: 2px 8px; border-radius: 4px;
            display: flex; gap: 5px; align-items: center;
        }
        .counter-val { color: var(--accent); font-weight: bold; }

        /* --- MODAL --- */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 100; justify-content: center; align-items: center; }
        .modal.open { display: flex; }
        .modal-content { background: #111; border: 1px solid var(--accent); width: 90%; max-width: 500px; padding: 25px; border-radius: 12px; display: flex; flex-direction: column; gap: 15px; box-shadow: 0 0 30px rgba(118, 185, 0, 0.2); }
        .modal-header { font-size: 1.2rem; color: var(--accent); font-weight: bold; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .modal-row { display: flex; flex-direction: column; gap: 5px; margin-bottom: 10px; }
        .modal-row label { color: #aaa; font-size: 0.9rem; }
        .modal-row input[type="text"], .modal-row input[type="password"], .modal-row input[type="number"], .modal-row textarea { 
            width: 100%; background: #000; border: 1px solid #444; color: white; padding: 8px; border-radius: 4px; 
        }

        /* --- CODE BLOCKS --- */
        .code-container { position: relative; background: #000; margin: 10px 0; border-radius: 6px; border: 1px solid #333; overflow: hidden; font-family: 'Consolas', monospace; }
        pre { margin: 0; padding: 35px 15px 15px; overflow-x: auto; color: #ccc; }
        .code-actions { position: absolute; top: 5px; right: 5px; display: flex; gap: 5px; }
        .action-btn { background: rgba(255,255,255,0.1); color: #fff; border: none; padding: 3px 8px; font-size: 0.7rem; cursor: pointer; }
        .action-btn:hover { background: var(--accent); color: #000; }

        /* --- FILE UPLOAD UI --- */
        #uploaded-files-area { font-size: 0.8rem; color: var(--accent); display: flex; gap: 5px; flex-wrap: wrap; }
        .file-tag { background: #222; padding: 2px 6px; border-radius: 4px; border: 1px solid #444; }

        /* --- WHISPER UI --- */
        .whisper-status { font-size: 0.8rem; font-weight: bold; color: #555; margin-left: 10px; }
        .whisper-status.active { color: #ff4757; }

        /* --- VAKBARÁT MENÜ --- */
        #blind-menu {
            display: none;
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 80%;
            max-width: 600px;
            background: #000;
            border: 3px dashed var(--accent);
            color: white;
            padding: 20px;
            z-index: 2000;
            flex-direction: column;
            gap: 15px;
            box-shadow: 0 0 50px rgba(118, 185, 0, 0.3);
        }
        #blind-menu.visible { display: flex; }
        
        .blind-menu-title {
            text-align: center; 
            font-size: 1.5rem; 
            color: var(--accent); 
            border-bottom: 1px solid #333; 
            padding-bottom: 10px; 
            margin-bottom: 10px;
        }

        .blind-menu-row {
            padding: 15px;
            font-size: 1.2rem;
            border: 2px solid #333;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .blind-menu-row.selected {
            background: var(--accent);
            color: #000;
            font-weight: bold;
            border-color: #fff;
        }

        .blind-menu-footer {
            text-align: center; 
            font-size: 0.8rem; 
            color: #888; 
            margin-top: 10px; 
            border-top: 1px solid #333; 
            padding-top: 10px;
        }

        #valasz-doboz { display: contents; } 
    </style>
</head>
<body>

    <!-- AUDIO ELEMENT -->
    <audio id="sfx-send" src="sound/send.mp3" preload="auto"></audio>

    <!-- VAKBARÁT MENÜ (1+5) -->
    <div id="blind-menu">
        <div class="blind-menu-title">BEÁLLÍTÁSOK (1+5)</div>
        <div id="blind-menu-rows"></div>
        <div class="blind-menu-footer">
            2: Le | 4: Fel | 1: Választás/Küldés | 3: Érték + | 0: Menü bezárása
        </div>
    </div>

    <!-- OPTIONS MODAL (Eredeti, egérvezérelt) -->
    <div id="options-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">Beállítások</div>
            
            <!-- API Keys Section -->
            <div class="modal-row" style="border:1px solid #333; padding:10px; border-radius:6px; background:#0a0a0a;">
                <label style="color:var(--accent); font-weight:bold;">API Kulcsok</label>
                <input type="password" id="opt-gemini-key" placeholder="Gemini API Key">
                <input type="password" id="opt-cerebras-key" placeholder="Cerebras API Key">
                <input type="password" id="opt-groq-key" placeholder="Groq API Key">
            </div>

            <div class="modal-row">
                <label>Memória Kontextus (Üzenetek száma)</label>
                <input type="number" id="opt-history-limit" value="20" min="0" max="100">
            </div>
            <div class="modal-row">
                <label>Várható válasz hossz (Instrukció mondatban)</label>
                <input type="text" id="opt-length-instr" placeholder="pl. Rövid válasz." value="Normál hosszúságú válasz.">
                <small style="color:#666; font-size:0.7rem;">Ez a mondat bekerül a rendszer utasítások közé.</small>
            </div>
            <div class="modal-row">
                <div style="display: flex; justify-content: space-between;">
                    <label>System Prompt</label>
                    <button onclick="setExpertPrompt()" class="btn-base" style="height:30px; padding:0 10px; font-size:0.7rem;">Dev Mode</button>
                </div>
                <textarea id="opt-system-rules" style="height: 80px;" placeholder="Rendszer utasítások..."></textarea>
            </div>
            <div class="modal-row">
                <label>AI Temperature (<span id="opt-temperature-value">0.7</span>)</label>
                <div style="display:flex; align-items:center; gap:10px;">
                    <input type="range" id="opt-temperature" min="0" max="1" step="0.1" value="0.7" style="flex:1">
                    <input type="checkbox" id="chk-use-temperature">
                </div>
            </div>
            
            <!-- MÓDOSÍTOTT SOR: Auto-Save és Törlés gomb -->
            <div class="modal-row" style="flex-direction:row; gap:10px; align-items:center; flex-wrap:wrap;">
                <div style="display:flex; align-items:center; gap:5px;">
                    <input type="checkbox" id="chk-autosave"> <label for="chk-autosave">Auto-Save</label>
                    <button onclick="clearHistory()" class="btn-base" style="padding:2px 8px; font-size:0.7rem; color:#ff4757; border-color:#ff4757; margin-left:5px;">🗑️ Törlés</button>
                </div>
                <div style="display:flex; align-items:center; gap:5px; margin-left:auto;">
                    <input type="checkbox" id="chk-safemode"> <label for="chk-safemode">Safe Mode</label>
                </div>
            </div>

            <div class="modal-row">
                <div style="display:flex; gap:10px;">
                    <button onclick="saveTalkToTxt()" class="btn-base" style="flex:1">💾 Save</button>
                    <button onclick="document.getElementById('load-talk-file').click()" class="btn-base" style="flex:1">📂 Load</button>
                    <input type="file" id="load-talk-file" style="display:none" onchange="loadTalkFromTxt(event)">
                </div>
            </div>
            <button class="btn-base btn-main" style="height:40px;" onclick="saveAndCloseOptions()">MENTÉS & BEZÁRÁS</button>
        </div>
    </div>

    <!-- HEADER -->
    <header>
        <div>KIMI-STATION v2.16</div>
        <div class="header-controls">
            <div class="counter-badge">GEM: <span id="gem-count" class="counter-val">0</span> <span onclick="resetCounter('gemini')" style="cursor:pointer;">x</span></div>
            <div class="counter-badge">CER: <span id="cer-count" class="counter-val">0</span> <span onclick="resetCounter('cerebras')" style="cursor:pointer;">x</span></div>
            <button onclick="toggleOptions()" class="btn-base" style="padding: 2px 8px; font-size: 0.7rem;">⚙️</button>
        </div>
    </header>

    <!-- MAIN CHAT AREA -->
    <div id="main-container">
        <div id="valasz-doboz">
            <div style="text-align:center; color:#333; margin-top:50px;"></div>
        </div>
    </div>

    <!-- BOTTOM CONTROLS -->
    <div class="bottom-panel" id="bottom-panel">
        <!-- Status & Tools Row -->
        <div class="status-row">
            <div style="display:flex; gap:10px; align-items:center;">
                <select id="aiModel" onchange="saveModelSelection()" style="max-width: 150px;">
                    <option value="" disabled selected>Betöltés...</option>
                </select>
                <span id="st-text">READY</span>
                <span id="st-time">0.00s</span>
            </div>
            <div style="display:flex; gap:10px; align-items:center;">
                <span id="tts-label">TTS: IDLE</span>
                <span id="mic-status-text" class="whisper-status">MIC: IDLE</span>
            </div>
        </div>

        <!-- Extra Toolbar (Scrollable) -->
        <div class="extra-tools">
             <button class="btn-base btn-icon" onclick="document.getElementById('file-upload').click()" title="Fájl feltöltés">📂</button>
             <button class="btn-base btn-icon" onclick="togglePromptHistory()" title="Előzmények">📜</button>
             <button class="btn-base btn-icon" onclick="navHistory(-1)" title="Előző üzenet (5)">◀</button>
             <span id="nav-counter" style="padding: 5px; color:#666;">0/0</span>
             <button class="btn-base btn-icon" onclick="navHistory(1)" title="Következő üzenet (6)">▶</button>
             
             <select id="langSelect" style="width:60px;">
                <option value="hu">HU</option>
                <option value="en">EN</option>
                <option value="auto">Auto</option>
             </select>
             <label style="display:flex; align-items:center; font-size:0.7rem; gap:3px; color:#666;">
                 <input type="checkbox" id="vibToggle"> Vib
             </label>
             <label style="display:flex; align-items:center; font-size:0.7rem; gap:3px; color:#666;">
                 <input type="checkbox" id="wordPauseToggle" onchange="saveAutoSaveSettings()"> Szünet
             </label>
        </div>

        <!-- File List Display -->
        <div id="uploaded-files-area">
            <div id="file-list" style="display:flex; gap:5px; flex-wrap:wrap;"></div>
            <span id="char-count" style="display:none">0</span> 
        </div>

        <!-- Input Box -->
        <div class="input-box">
            <div class="ptt-btn" id="ptt-btn" title="Nyomd a 7-es gombot vagy ezt">🎤</div>
            <button id="paste-btn" class="btn-base btn-icon" onclick="pasteAsFile()" title="Vágólap beillesztése fájlként">📋</button>
            <textarea id="kerdes" placeholder="Írj valamit..."></textarea>
            <button id="generate-btn" class="btn-base btn-main">KÜLDÉS</button>
        </div>
    </div>

    <!-- Hidden Inputs -->
    <input type="file" id="file-upload" style="display:none" multiple onchange="handleFileUpload(event)">
    <div id="prompt-history-panel" style="display:none; position:fixed; bottom:160px; left:10px; background:#111; border:1px solid #333; padding:10px; width:300px; max-height:200px; overflow-y:auto; z-index:50;">
        <h3 style="margin:0 0 5px 0; font-size:0.9rem; color:var(--accent);">Előzmények</h3>
        <div id="prompt-list"></div>
    </div>

        const MAX_TTS_SENTENCES = 100;
        const MAX_TTS_CHARS = 5000;

        /* ---------- GLOBALIS VÁLTOZÓK ---------- */
        let chatHistory = []; 
        let currentNavIndex = -1;
        let keysPressed = {}; 
        let usageCounts = { gemini: 0, cerebras: 0 };
        
        let settings = {
            geminiKey: "",
            cerebrasKey: "",
            groqKey: "",
            historyLimit: 20,
            systemRules: `küldhetsz bármit, most éjfél van.`,
            lengthInstruction: "Normál hosszúságú válasz.",
            uploadedFiles: [],          
            uploadedContext: "",
            autoSave: false,
            safeMode: false,
            useTemperature: false,
            temperature: 0.7
        };

        let whisperHistoryStack = []; 
        let mediaRecorder;
        let audioChunks = [];
        let isRecording = false;
        let lastAiResponse = ""; 
        let synth = window.speechSynthesis;
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        /* ---------- VAKBARÁT MENÜ ÁLLAPOT ---------- */
        let isBlindMenuOpen = false;
        let blindMenuIndex = 0;
        let blindMenuItems = [];

        /* ---------- TTS ÁLLAPOT ---------- */
        window.ttsState = {
            useWordBasedPauses: true,
            isPlaying: false,
            currentSentences: [],
            currentSentenceIndex: -1,
            ttsInterrupted: false,
            currentUtterance: null,
            onEndCallback: null
        };

        /* ---------- AUTO-HIDE LOGIC ---------- */
        let autoHideTimer;
        const AUTO_HIDE_DELAY = 7000; 
        const TRIGGER_Y = 770;

        function resetAutoHideTimer() {
            clearTimeout(autoHideTimer);
            showBottomPanel(); 
            autoHideTimer = setTimeout(hideBottomPanel, AUTO_HIDE_DELAY);
        }

        function hideBottomPanel() {
            const panel = document.querySelector('.bottom-panel');
            if(panel) panel.classList.add('panel-hidden');
        }

        function showBottomPanel() {
            const panel = document.querySelector('.bottom-panel');
            if (panel) {
                panel.classList.remove('panel-hidden');
            }
        }

        function handleGlobalTouch(e) {
            const y = e.touches[0].clientY;
            if (y >= TRIGGER_Y) {
                showBottomPanel();
                resetAutoHideTimer();
                return;
            }
            const panel = document.querySelector('.bottom-panel');
            if (panel && panel.contains(e.target)) {
                resetAutoHideTimer();
            }
        }

        function handleGlobalMouse(e) {
            const y = e.clientY;
            if (y >= TRIGGER_Y) {
                showBottomPanel();
                resetAutoHideTimer();
            }
            const panel = document.querySelector('.bottom-panel');
            if (panel && panel.contains(e.target)) {
                resetAutoHideTimer();
            }
        }

        const randomIdo = (t) => { const [min, max] = t; return min===0 && max===0 ? 0 : Math.floor(Math.random()*(max-min+1))+min; };

        window.splitIntoSentences = function(text) {
            if (window.ttsState.useWordBasedPauses) {
                const keys = Object.keys(szunetSzabalyok);
                const regex = new RegExp(`(?<=[.!?])\\s+|${keys.map(s=>`(?=\\b${s}\\b)|(?<=\\b${s}\\b)`).join('|')}`, 'i');
                return text.split(regex).map(s => s.trim()).filter(s => s.length > 0);
            }
            return (text.match(/[^.!?]+[.!?]+/g) || [text]).map(s => s.trim()).filter(s => s.length > 0);
        };

        window.calculatePause = function(sentence, nextSentence) {
            if (!window.ttsState.useWordBasedPauses) return 500;
            const tiszta = sentence.trim().replace(/[.!?,;:]/g, '').toLowerCase();
            let p = 0;
            if (szunetSzabalyok[tiszta]) p = randomIdo(szunetSzabalyok[tiszta][1]);
            return p;
        };

        function readNext() {
            if (!window.ttsState.isPlaying || window.ttsState.currentSentenceIndex >= window.ttsState.currentSentences.length - 1) {
                window.ttsState.isPlaying = false;
                document.getElementById('tts-label').textContent = "TTS: IDLE";
                
                if (window.ttsState.onEndCallback) {
                    const cb = window.ttsState.onEndCallback;
                    window.ttsState.onEndCallback = null;
                    try { cb(); } catch(e) { console.error("TTS Callback Error:", e); }
                }
                return;
            }
            window.ttsState.currentSentenceIndex++;
            const s = window.ttsState.currentSentences[window.ttsState.currentSentenceIndex];
            const next = window.ttsState.currentSentences[window.ttsState.currentSentenceIndex + 1];
            const utter = new SpeechSynthesisUtterance(s);
            utter.lang = (document.getElementById('langSelect').value === 'en') ? 'en-US' : 'hu-HU';
            utter.onstart = () => { document.getElementById('tts-label').textContent = "TTS: SPEAKING"; };
            utter.onend = () => {
                const ms = window.calculatePause(s, next);
                setTimeout(() => { 
                    if (window.ttsState.isPlaying) readNext(); 
                }, ms);
            };
            synth.speak(utter);
        }

        /* --- ÚJ: PREPARE FOR SPEECH (CSILLAGOK NÉLKÜL) --- */
        function prepareForSpeech(text) {
            if (!text) return "";

            return text
                // 1. Linkek kezelése
                .replace(/\[([^\]]+)\]\(https?:\/\/[^\s)]+\)/g, '... $1')
                .replace(/https?:\/\/[^\s]+/g, '... link')
                
                // 2. KÖTELEZŐ: Összes csillag eltávolítása (egyedülállóak is)
                .replace(/\*/g, '') 
                
                // 3. Egyéb Markdown karakterek (Cím, aláhúzás, kód stb.)
                .replace(/[#_~`>=<\-]{2,}/g, ' ')  // Ismétlődő jelek
                .replace(/[#_~`>=<\-]/g, '')       // Maradék egyedülálló jelek
                
                // 4. White space tisztítás
                .replace(/\s+/g, ' ')
                .trim();
        }

        function cleanTextForTTS(text) {
            if (!text) return "";
            // Kód blokkok cseréje először
            let cleaned = text.replace(/```[\s\S]*?```/g, " kód ");
            cleaned = cleaned.replace(/`[^`]+`/g, " kód ");
            
            // Majd a prepareForSpeech futása (ami kiveszi a csillagokat)
            cleaned = prepareForSpeech(cleaned);
            
            cleaned = cleaned.replace(/\s+/g, ' ').trim();
            return cleaned;
        }

        function truncateForTTS(text) {
            let res = text; let trunc = false;
            if (res.length > MAX_TTS_CHARS) { res = res.slice(0, MAX_TTS_CHARS); trunc = true; }
            const sent = window.splitIntoSentences(res);
            if (sent.length > MAX_TTS_SENTENCES) { res = sent.slice(0, MAX_TTS_SENTENCES).join(' '); trunc = true; }
            return { text: res, truncated: trunc };
        }

        function speak(text, callback) {
            if (!text) return;
            stopTTS();
            const textWithoutCode = cleanTextForTTS(text);
            const { text: safeText, truncated } = truncateForTTS(textWithoutCode);
            document.getElementById('tts-label').textContent = truncated ? "TTS: TRUNCATED" : "TTS: SPEAKING";
            window.ttsState.currentSentences = window.ttsState.useWordBasedPauses ? window.splitIntoSentences(safeText) : [safeText];
            window.ttsState.currentSentenceIndex = -1;
            window.ttsState.isPlaying = true;
            window.ttsState.onEndCallback = callback || null;
            readNext();
        }

        function playSendSound() {
            const audio = document.getElementById('sfx-send');
            const tryMp3 = Math.random() > 0.5;

            if (tryMp3 && audio) {
                audio.currentTime = 0;
                const playPromise = audio.play();
                if (playPromise !== undefined) {
                    playPromise.catch(error => {
                        console.log("MP3 hiba vagy nem található, használom az oscilla hangot.");
                        playOscillatorSound();
                    });
                }
            } else {
                playOscillatorSound();
            }
        }

        function playOscillatorSound() {
            try {
                if (audioCtx.state === 'suspended') audioCtx.resume();
                const osc = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                osc.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(200, audioCtx.currentTime); 
                osc.frequency.exponentialRampToValueAtTime(800, audioCtx.currentTime + 0.1);
                gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.3);
            } catch(e) { console.error("Oszillator hiba:", e); }
        }

        async function runAI() {
            const modelVal = document.getElementById('aiModel').value;
            const prompt = document.getElementById('kerdes').value.trim();
            if(!prompt || !modelVal) { speak(""); return; }
            
            playSendSound();

            addPromptToHistory(prompt);
            renderOutput(`<div class="msg u">${escapeHTML(prompt)}</div><div class="msg k"><i>AI gondolkodik...</i></div>`);
            
            const start = performance.now();
            try {
                let responseText = "";
                let messages = buildContext(prompt); 
                const isCerebras = modelVal.startsWith("cerebras:");
                const isGroq = modelVal.startsWith("groq:");

                if (isGroq || isCerebras) {
                    const apiKey = isGroq ? settings.groqKey : settings.cerebrasKey;
                    if (!apiKey) throw new Error("Hiányzó API kulcs a beállításokban!");
                    
                    const apiUrl = isGroq ? "https://api.groq.com/openai/v1/chat/completions" : "https://api.cerebras.ai/v1/chat/completions";
                    const modelId = modelVal.split(":")[1]; 
                    
                    const req = { model: modelId, messages: messages };
                    if (modelId.toLowerCase().includes("qwen") || modelId.toLowerCase().includes("deepseek")) req.reasoning_format = "hidden";
                    if (settings.useTemperature) req.temperature = settings.temperature;
                    
                    const res = await fetch(apiUrl, { method: "POST", headers: { "Authorization": `Bearer ${apiKey}`, "Content-Type": "application/json" }, body: JSON.stringify(req) });
                    const data = await res.json();
                    if (data.error) throw new Error(data.error.message);
                    responseText = data.choices[0].message.content;
                    usageCounts.cerebras++;
                } else {
                    if (!settings.geminiKey) throw new Error("Hiányzó Gemini API kulcs a beállításokban!");
                    
                    const req = { contents: [{ parts: [{ text: messages.map(m => `[${m.role.toUpperCase()}]: ${m.content}`).join("\n\n") }] }] };
                    if (settings.useTemperature) req.generationConfig = { temperature: settings.temperature };
                    
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${modelVal}:generateContent?key=${settings.geminiKey}`, { method: 'POST', headers: { "Content-Type": "application/json" }, body: JSON.stringify(req) });
                    const data = await res.json();
                    if (data.error) throw new Error(data.error.message);
                    responseText = data.candidates[0].content.parts[0].text;
                    usageCounts.gemini++;
                }
                updateCounterDisplay();
                document.getElementById('st-time').textContent = ((performance.now() - start) / 1000).toFixed(2) + "s";
                addToHistory(prompt, responseText);
                document.getElementById('kerdes').value = "";
                lastAiResponse = responseText;
                speak(responseText);
            } catch (e) { 
                const errMsg = e.message || "Ismeretlen hiba";
                renderOutput(`<div class="msg k" style="color:red">HIBA: ${escapeHTML(errMsg)}</div>`); 
                speak("Hiba történt. " + errMsg);
            }
        }

        function buildContext(currentPrompt) {
            let msgs = [];
            if (settings.systemRules && settings.systemRules.trim() !== "") {

            if (settings.lengthInstruction && settings.lengthInstruction.trim() !== "") {
                msgs.push({ role: "system", content: `Válaszadási stíluskorlátozás: ${settings.lengthInstruction}` });
            }
            if (settings.uploadedContext && settings.uploadedContext.trim() !== "") {
                msgs.push({ role: "system", content: settings.uploadedContext });
            }

            const recent = chatHistory.slice(-settings.historyLimit);
            recent.forEach(turn => { 
                if(turn.user) msgs.push({ role: "user", content: turn.user }); 
                if(turn.ai) msgs.push({ role: "assistant", content: turn.ai }); 
            });
            
            msgs.push({ role: "user", content: currentPrompt + " (1.Te ne használj csillagokat 2.NE HASZNÁLJ MARKDOWN FORMÁZÁST 3.Gépi felolvasásra optimalizált formátum: Táblázatok helyett tagolt felsorolást (egyszerű gondolatjelet vagy számokat) kell használnod, mert a TTS a táblázatokat nem tudja értelmesen felolvasni. 4. Néha elírás van a felhasználó válaszában, ez a mikrofonja hibája és próbálj a kontextusnak megfelelően korrigálva megérteni. Tehát az átlopos egyetemista valójában egy átlagos egyetemista.    )" });
            return msgs;
        }

                if(textToCopy.includes("COPY")) {

                        bubble.style.backgroundColor = "rgba(255, 255, 255, 0.2)";
                        setTimeout(() => bubble.style.backgroundColor = originalBg, 200);
                    }).catch(err => {
                        console.error('Másolási hiba:', err);
                    });
                }
            }
        });

        function parseMarkdown(text) {
            const renderer = new marked.Renderer();
            renderer.code = (code, lang) => {
                let codeContent = "";
                if (typeof code === 'object' && code !== null) {
                    codeContent = code.text || JSON.stringify(code);
                } else {
                    codeContent = String(code || "");
                }
                return `<div class="code-container"><div class="code-actions"><button class="action-btn copy-btn">COPY</button></div><pre><code class="${lang||''}">${escapeHTML(codeContent)}</code></pre></div>`;
            };
            return marked.parse(String(text), { renderer });
        }

        function escapeHTML(text) {
            return String(text).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
        }

        /* ---------- FILE UPLOAD ---------- */
        function handleFileUpload(event) {
            const files = event.target.files;
            if (!files.length) return;
            Array.from(files).forEach(file => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    settings.uploadedFiles.push({ name: file.name, content: e.target.result, size: file.size });
                    rebuildUploadedContext(); updateUploadedFilesDisplay();
                };
                reader.readAsText(file);
            });
            event.target.value = "";
        }

        async function pasteAsFile() {
            try {
                const text = await navigator.clipboard.readText();
                if (!text) { speak("A vágólap üres!"); return; }
                const now = new Date();
                const timeStr = now.getHours().toString().padStart(2,'0') + "-" + now.getMinutes().toString().padStart(2,'0') + "-" + now.getSeconds().toString().padStart(2,'0');
                const dummyFile = { name: `vagolap_${timeStr}.txt`, content: text, size: text.length };
                settings.uploadedFiles.push(dummyFile);
                rebuildUploadedContext();
                updateUploadedFilesDisplay();
                beep(800, 0.1);
                const btn = document.getElementById('paste-btn');
                const originalHTML = btn.innerHTML;
                btn.innerHTML = "✅";
                setTimeout(() => { btn.innerHTML = originalHTML; }, 1000);
            } catch (err) { console.error(err); alert("Hiba a vágólap eléréséhez."); }
        }

        function rebuildUploadedContext() {
            settings.uploadedContext = settings.uploadedFiles.map(f => `[FILE: ${f.name}]:\n${f.content}\n`).join("\n");
        }

        function updateUploadedFilesDisplay() {
            const list = document.getElementById('file-list');
            list.innerHTML = "";
            settings.uploadedFiles.forEach((f, idx) => {
                const div = document.createElement('div');
                div.className = "file-tag";
                div.innerHTML = `${f.name} <span onclick="removeFile(${idx})" style="cursor:pointer;color:red;font-weight:bold;">&times;</span>`;
                list.appendChild(div);
            });
            document.getElementById('char-count').textContent = settings.uploadedFiles.reduce((s,f)=>s+f.content.length,0);
        }

        function removeFile(idx) { settings.uploadedFiles.splice(idx,1); rebuildUploadedContext(); updateUploadedFilesDisplay(); }

        /* ---------- PROMPT HISTORY ---------- */
        let promptHistory = [];
        function loadPromptHistory() {
            const s = localStorage.getItem(PROMPT_HISTORY_KEY);
            if(s) promptHistory = JSON.parse(s);
            renderPromptList();
        }
        function addPromptToHistory(txt) {
            if(promptHistory[promptHistory.length-1]!==txt) {
                promptHistory.push(txt);
                if(promptHistory.length>10) promptHistory.shift();
                localStorage.setItem(PROMPT_HISTORY_KEY, JSON.stringify(promptHistory));
                renderPromptList();
            }
        }
        function renderPromptList() {
            const l = document.getElementById('prompt-list');
            l.innerHTML = "";
            [...promptHistory].reverse().forEach(p => {
                const d = document.createElement('div');
                d.textContent = p;
                d.style.cssText = "padding:5px; border-bottom:1px solid #333; cursor:pointer;";
                d.onclick = () => { document.getElementById('kerdes').value = p; };
                l.appendChild(d);
            });
        }
        function togglePromptHistory() {
            const p = document.getElementById('prompt-history-panel');
            p.style.display = p.style.display==="none"?"block":"none";
        }

        /* ---------- UTIL ---------- */
        function loadCounters() {
            const s = localStorage.getItem('cs_counts');
            if(s) usageCounts = JSON.parse(s);
            updateCounterDisplay();
        }
        function updateCounterDisplay() {
            document.getElementById('gem-count').textContent = usageCounts.gemini;
            document.getElementById('cer-count').textContent = usageCounts.cerebras;
            localStorage.setItem('cs_counts', JSON.stringify(usageCounts));
        }
        function resetCounter(k) { usageCounts[k]=0; updateCounterDisplay(); }
        function stopTTS() { 
            synth.cancel(); 
            window.ttsState.isPlaying = false; 
            window.ttsState.onEndCallback = null; 
        }
        function beep(f=550, d=0.15) {
            try { const o=audioCtx.createOscillator(); const g=audioCtx.createGain(); o.connect(g); g.connect(audioCtx.destination); o.frequency.value=f; g.gain.value=0.05; o.start(); o.stop(audioCtx.currentTime+d); } catch(e){}
        }

        /* ---------- RECORDING ---------- */
        async function startRecording(msg) {
            stopTTS(); isRecording = true; audioChunks=[];
            document.getElementById('st-text').textContent = msg;
            document.getElementById('mic-status-text').className = "whisper-status active";
            document.getElementById('mic-status-text').textContent = "MIC: REC";
            beep(600,0.1);
            try {
                const s = await navigator.mediaDevices.getUserMedia({audio:true});
                mediaRecorder = new MediaRecorder(s);
                mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                mediaRecorder.onstop = sendToWhisper;
                mediaRecorder.start();
            } catch(e) { isRecording=false; console.error(e); }
        }
        function stopRecording() { if(isRecording) { isRecording=false; document.getElementById('st-text').textContent = "PROC..."; mediaRecorder.stop(); beep(300,0.1); } }

        async function sendToWhisper() {
            const form = new FormData();
            form.append("file", new Blob(audioChunks, {type:'audio/mpeg'}), "audio.m4a");
            form.append("model", "whisper-large-v3-turbo");
            const lang = document.getElementById('langSelect').value;
            if(lang!=="auto") form.append("language", lang);
            try {
                if(!settings.groqKey) { alert("Hiányzó Groq API kulcs a felvételhez!"); return; }
                
                const res = await fetch("https://api.groq.com/openai/v1/audio/transcriptions", { method:"POST", headers:{"Authorization":`Bearer ${settings.groqKey}`}, body:form });
                const d = await res.json();
                if(d.text) {
                    const input = document.getElementById('kerdes');
                    input.value += (input.value ? '\n' : '') + d.text;
                    speak(d.text);
                }
            } catch(e) { console.error(e); }
            document.getElementById('st-text').textContent = "READY";
            document.getElementById('mic-status-text').className = "whisper-status";
            document.getElementById('mic-status-text').textContent = "MIC: IDLE";
        }

        /* ---------- KEYBOARD LISTENERS ---------- */
        document.addEventListener('keydown', e => {
            keysPressed[e.key] = true;
            const panel = document.querySelector('.bottom-panel');
            if(panel && panel.classList.contains('panel-hidden')) {
                showBottomPanel();
                resetAutoHideTimer();
            }

            if (keysPressed['1'] && keysPressed['6']) {
                e.preventDefault();
                stopTTS();
                speak("Oldal újratöltése indul.", () => { location.reload(); });
                return;
            }
            if (keysPressed['1'] && keysPressed['5']) {
                e.preventDefault();
                toggleBlindMenu();
                return;
            }
            if (isBlindMenuOpen) {
                e.preventDefault();
                if (e.key === '0') { toggleBlindMenu(); return; } 
                if (e.key === '2') { navigateBlindMenu(1); return; } 
                if (e.key === '4') { navigateBlindMenu(-1); return; } 
                if (e.key === '1') { 
                    const activeItem = blindMenuItems[blindMenuIndex];
                    if (activeItem.type === 'quick_prompt') {
                        toggleBlindMenu(); 
                    } else {
                        changeBlindValue(-1); 
                    }
                    return; 
                } 
                if (e.key === '3') { changeBlindValue(1); return; } 
                return; 
            }
            const isTyping = e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA';
            if(isTyping) { resetAutoHideTimer(); return; } 
            
            if (e.key === '5') { e.preventDefault(); navHistory(-1); return; }
            if (e.key === '6') { e.preventDefault(); navHistory(1); return; }
            if(e.key==='1') { e.preventDefault(); runAI(); }
            if(e.key==='2') { e.preventDefault(); speak(lastAiResponse); }
            if(e.key==='3') { e.preventDefault(); smartDelete(); }  
            if(e.key==='7' && !isRecording) { e.preventDefault(); startRecording("REC..."); }
            if(e.key==='8') { e.preventDefault(); isRecording ? stopRecording() : startRecording("CONT..."); }
        });

        document.addEventListener('keyup', e => { delete keysPressed[e.key]; });

        /* ---------- REFACTOR: MODEL LOADER HELPER ---------- */
        async function loadProviderModels(provider, apiKey, url, prefix, selectElement) {
            if(!apiKey) return;
            try {
               const headers = provider === 'gemini' ? {} : {"Authorization": `Bearer ${apiKey}`};
               const r = await fetch(url, { headers });
               const d = await r.json();
               
               if (provider === 'gemini') {
                   d.models?.forEach(m => { 
                       if(m.supportedGenerationMethods.includes("generateContent")) 
                            selectElement.innerHTML += `<option value="${m.name.replace("models/","")}">${m.displayName}</option>`; 
                   });
               } else {
                   d.data?.forEach(m => selectElement.innerHTML += `<option value="${prefix}:${m.id}">${prefix.charAt(0).toUpperCase() + prefix.slice(1)}: ${m.id}</option>`);
               }
            } catch(e) { console.error(`Hiba a ${provider} modellek betöltésekor`, e); }
        }

        /* ---------- CLEAR HISTORY FUNCTION ---------- */
        function clearHistory() {
            if(confirm("Biztosan törlöd az összes mentett beszélgetést?")) {
                localStorage.removeItem('cs_autosave');
                chatHistory = [];
                currentNavIndex = -1;
                updateNav();
                renderCurrent();
                speak("Előzmények törölve.");
            }
        }

        /* ---------- INITIALIZATION ---------- */
        document.addEventListener('DOMContentLoaded', async () => {
            document.addEventListener('touchstart', handleGlobalTouch, {passive: false});
            document.addEventListener('mousemove', handleGlobalMouse); 
            resetAutoHideTimer();

            loadAutoSaveSettings();
            loadCounters(); 
            loadPromptHistory();
            document.getElementById('generate-btn').addEventListener('click', runAI);
            
            if (settings.autoSave) {
                const savedChat = localStorage.getItem('cs_autosave');
                if (savedChat) {
                    try {
                        chatHistory = JSON.parse(savedChat);
                        currentNavIndex = chatHistory.length - 1;
                        updateNav();
                        renderCurrent();
                        console.log("Auto-Save beszélgetés betöltve.");
                    } catch(e) {
                        console.error("Hiba a mentett beszélgetés betöltésekor", e);
                    }
                }
            }
            
            const sel = document.getElementById('aiModel');
            sel.innerHTML = `<option value="" disabled selected>Betöltés...</option>`;
            
            await loadProviderModels('gemini', settings.geminiKey, `https://generativelanguage.googleapis.com/v1beta/models?key=${settings.geminiKey}`, 'gemini', sel);
            await loadProviderModels('cerebras', settings.cerebrasKey, "https://api.cerebras.ai/v1/models", 'cerebras', sel);
            await loadProviderModels('groq', settings.groqKey, "https://api.groq.com/openai/v1/models", 'groq', sel);

            const savedM = localStorage.getItem('cs_last_model');
            if(savedM) sel.value = savedM;

            const ptt = document.getElementById('ptt-btn');
            ptt.addEventListener('mousedown', ()=>startRecording("REC..."));
            ptt.addEventListener('mouseup', stopRecording);
            ptt.addEventListener('touchstart', (e)=>{e.preventDefault(); startRecording("REC...");});
            ptt.addEventListener('touchend', (e)=>{e.preventDefault(); stopRecording();});
        });

        /* Options Logic */
        function toggleOptions() { 
            const modal = document.getElementById('options-modal');
            const isOpen = modal.classList.contains('open');
            if (!isOpen) {
                document.getElementById('opt-gemini-key').value = settings.geminiKey;
                document.getElementById('opt-cerebras-key').value = settings.cerebrasKey;
                document.getElementById('opt-groq-key').value = settings.groqKey;
                document.getElementById('opt-history-limit').value = settings.historyLimit;
                document.getElementById('opt-system-rules').value = settings.systemRules;
                document.getElementById('opt-temperature').value = settings.temperature;
                document.getElementById('opt-temperature-value').textContent = settings.temperature;
                document.getElementById('chk-use-temperature').checked = settings.useTemperature;
                document.getElementById('chk-autosave').checked = settings.autoSave;
                document.getElementById('chk-safemode').checked = settings.safeMode;
                document.getElementById('opt-length-instr').value = settings.lengthInstruction;
            }
            modal.classList.toggle('open'); 
        }

        function saveAndCloseOptions() {
             settings.geminiKey = document.getElementById('opt-gemini-key').value;
             settings.cerebrasKey = document.getElementById('opt-cerebras-key').value;
             settings.groqKey = document.getElementById('opt-groq-key').value;
             settings.historyLimit = document.getElementById('opt-history-limit').value;
             settings.systemRules = document.getElementById('opt-system-rules').value;
             settings.autoSave = document.getElementById('chk-autosave').checked;
             settings.useTemperature = document.getElementById('chk-use-temperature').checked;
             settings.temperature = document.getElementById('opt-temperature').value;
             settings.lengthInstruction = document.getElementById('opt-length-instr').value; 
             saveAutoSaveSettings();
             
             const sel = document.getElementById('aiModel');
             const currentVal = sel.value;
             sel.innerHTML = `<option value="" disabled selected>Betöltés...</option>`;
             loadProviderModels('gemini', settings.geminiKey, `https://generativelanguage.googleapis.com/v1beta/models?key=${settings.geminiKey}`, 'gemini', sel);
             loadProviderModels('cerebras', settings.cerebrasKey, "https://api.cerebras.ai/v1/models", 'cerebras', sel);
             loadProviderModels('groq', settings.groqKey, "https://api.groq.com/openai/v1/models", 'groq', sel);
             if(currentVal) sel.value = currentVal;

             toggleOptions();
        }
        function saveModelSelection() { localStorage.setItem('cs_last_model', document.getElementById('aiModel').value); }
        function setExpertPrompt() { document.getElementById('opt-system-rules').value = settings.systemRules; }
        function saveTalkToTxt() {
            const blob = new Blob([JSON.stringify(chatHistory, null, 2)], {type:"text/plain"});
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download="chat.txt"; a.click();
        }
        function loadTalkFromTxt(e) {
            const r = new FileReader();
            r.onload = ev => { chatHistory = JSON.parse(ev.target.result); currentNavIndex = chatHistory.length-1; updateNav(); renderCurrent(); };
            r.readAsText(e.target.files[0]);
        }
        function saveAutoSaveTalk() { 
            if(settings.autoSave) localStorage.setItem('cs_autosave', JSON.stringify(chatHistory)); 
            else localStorage.removeItem('cs_autosave'); 
        }
        function smartDelete() {
            const input = document.getElementById('kerdes');
            const text = input.value;
            if (!text) return;
            let lines = text.split('\n');
            let lastLine = lines[lines.length - 1];
            const sentences = lastLine.match(/[^.!?]+[.!?]+/g) || [lastLine];
            if (sentences.length >= 3) {
                sentences.pop();
                lines[lines.length - 1] = sentences.join('').trimEnd();
            } else {
                lines.pop();
            }
            input.value = lines.join('\n');
            input.style.backgroundColor = "#ff4757";
            setTimeout(() => input.style.backgroundColor = "", 200);
            beep(300, 0.05);
        }
    </script>
</body>
