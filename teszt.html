<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>Google TTS Lejátszás</title>
</head>
<body>

    <h3>Szöveg lejátszása</h3>
    
    <!-- 
         Megjegyzés: A linkben lévő szóközöket kódolni kell (%20), 
         vagy az encodeURI() függvényt kell használni JS-ben.
         Itt a működés kedvéért egy rövidebb szöveget használtam.
    -->
    <audio controls autoplay>
        <source src="https://translate.google.com/translate_tts?ie=UTF-8&tl=hu&client=tw-ob&q=Hello,%20ez%20egy%20teszt%20üzenet." type="audio/mpeg">
        A böngésződ nem támogatja az audio elemet.
    </audio>

</body>
</html>
